name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Build
        run: swift build

      - name: Run tests
        run: swift test --enable-code-coverage --parallel

      - name: Generate coverage report
        run: |
          # Find the test binary
          TEST_BIN=$(find .build/debug -name 'SwiftTemplatePackageTests' -type f | head -1)
          if [ -z "$TEST_BIN" ]; then
            TEST_BIN=".build/debug/SwiftTemplatePackageTests.xctest/Contents/MacOS/SwiftTemplatePackageTests"
          fi
          echo "Test binary: $TEST_BIN"
          
          # Also need to include the library objects for coverage
          xcrun llvm-cov export \
            "$TEST_BIN" \
            -instr-profile .build/debug/codecov/default.profdata \
            -format lcov \
            -ignore-filename-regex '.build|Tests' \
            > coverage.lcov

      - name: Check coverage threshold
        run: |
          TEST_BIN=$(find .build/debug -name 'SwiftTemplatePackageTests' -type f | head -1)
          if [ -z "$TEST_BIN" ]; then
            TEST_BIN=".build/debug/SwiftTemplatePackageTests.xctest/Contents/MacOS/SwiftTemplatePackageTests"
          fi
          
          # Get coverage report
          xcrun llvm-cov report \
            "$TEST_BIN" \
            -instr-profile .build/debug/codecov/default.profdata \
            -ignore-filename-regex '.build|Tests'
          
          COVERAGE=$(xcrun llvm-cov report \
            "$TEST_BIN" \
            -instr-profile .build/debug/codecov/default.profdata \
            -ignore-filename-regex '.build|Tests' \
            | grep -E '^TOTAL' | awk '{print $4}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 80.0" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below 80% threshold"
            exit 1
          fi

  lint:
    name: SwiftLint
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Run SwiftLint
        run: |
          brew install swiftlint
          swiftlint lint --strict


