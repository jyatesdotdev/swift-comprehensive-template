# SwiftLint Configuration — Security-Focused Rules
# Run: swiftlint lint --config .swiftlint.yml

included:
  - Sources
  - Tests

excluded:
  - .build
  - Package.swift

# Opt-in rules not enabled by default
opt_in_rules:
  - force_unwrapping
  - implicitly_unwrapped_optional
  - fatal_error_message
  - empty_catch
  - discouraged_optional_boolean
  - private_over_fileprivate

# Security rules — promoted to errors to fail CI
force_cast:
  severity: error

force_try:
  severity: error

force_unwrapping:
  severity: error

implicitly_unwrapped_optional:
  severity: warning
  mode: all_except_iboutlets

fatal_error_message:
  severity: warning

empty_catch:
  severity: error

# Standard style rules
line_length:
  warning: 120
  error: 200

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 1000

function_body_length:
  warning: 50
  error: 100

cyclomatic_complexity:
  warning: 10
  error: 20
